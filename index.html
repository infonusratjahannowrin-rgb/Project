html>
  <head>
   <link rel="stylesheet" href="Style.css">
  </head>
  <body>
    <form autocomplete="on">
  <h1 style="text-align:center">
    Sign Up Form</h1>
    <hr>
    <br>
    <fieldset>   
    <legend>Personal Info</legend>
    
    <label for="firstName">First Name</label>
  <input type="text" id="firstNname" name="first_name" placeholder="First name"required>
  <br><br>

  <label for="lastName">Last Name</label>
  <input type="text" id="lastName" name="last_name" placeholder="Last name"required>
  <br> <br>
  <label for="Date">Date Of Birth</label>
<input type="date"id="date_of_birth"name="dob"required>
<br> <br>
<label>Gender</label>
<br>
<input type="radio" id="Male" name="Gender" value="Male">
<label for="Male">Male</label>
<input type="radio" id="Female" name="Gender" value="Female">
<label for="Female">Female</label>

<input type="radio" id="Others" name="Gender" value="Others">
<label for="Others">Others</label>
<br> <br>

<label for="Country_input">Country</label>
<input type="text" list="Countrylist" id="Country_input" name="Country"placeholder="select Country">
<datalist id="Countrylist">
<option value="Bangladesh"></option>
<option value="India"></option>
  <option value="Pakistan"></option>
  <option value="USA"></option>
</datalist>
  </fieldset>
  <br> <br>
  <fieldset>
    <legend>Account Info</legend>

  <label for="email">Email</label>
  <input type="email" id="email" name="user_email" placeholder="User email" required>
  <br><br>
  <label for="Password">Password</label>
  <input type="password" id="Pass"name="Password"placeholder="Password"minlength="8"required>
  <br><br>
      <label for="ConfirmPass">Confirm Password</label>
    <input type="password" id="ConfirmPass" name="ConfirmPassword" placeholder="Confirm Password" minlength="8" required>
    <br><br>
      <label for="Phone Number">Phone Number</label>
<br>
<select name="Code">
  <option value="+880">+880</option>
    <option value="+91">+91</option>
      <option value="+1">+1</option>
    </select>
    <input type="tel" id="phone_number" name="phone_number" placeholder="×××××××××" maxlength="11" pattern="[0-9]{11}" required>

  </fieldset>
  <br>
    <br>
    <fieldset> 
    <legend> Others</legend>
    
<label for="time">Time</label>
<input type="time" id="Time" name="tm">
<br> <br>
<label for="file">Upload file</label>
<input type="file" id="file" name="file">
<br><br>
<label for="Comment">Your Comment</label>
<br> <br>
<textarea id="Comment" name="Comment" rows="5" cols="30" placeholder="write your comment...."></textarea>
 </fieldset>
 <br>
 <fieldset>
   <legend> Terms & Submit</legend>
<input type="checkbox" id="agree">
<label for="Agree">I agree to terms</label>
<br><br>

<input type="Submit" value="Send">
<input type="Reset" value="Reset">
 </fieldset>
 </form>
  </body>

 </html>
